<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale = 1.0">
        <title> Food Expiry Tracker </title>
        <link rel="stylesheet" href="style.css">

    </head>

    <body>

        <div class = "app-container">

            <header class = "app-header">
                <h1>Food Expiry Tracker</h1>
                <p class = "store-name"> 7 Eleven - The Gap </p>

            </header>
            <nav class = "tab-bar">
                <button class = "tab active" onclick="switchTab('alerts')">Alerts</button>
                <button class = "tab" onclick = "switchTab('delivery')">Delivery</button>
                <button class = "tab" onclick = "switchTab('stock')">Stock</button>
                <button class = "tab" onclick = "switchTab('items')">Items</button>

            </nav>

            <main class = "content">

                <section id="alerts" class="page active">
          <h2>Today's Alerts</h2>
          <p>No alerts yet — log a delivery to get started.</p>
        </section>

        <section id="delivery" class="page">
          <h2>Log Delivery</h2>
          <p>Delivery logging coming soon.</p>
        </section>

        <section id="stock" class="page">
          <h2>Stock Tracker</h2>
          <p>Stock tracking coming soon.</p>
        </section>

        <section id="items" class="page">
          <h2>Item Settings</h2>
          <p>Item management coming soon.</p>
        </section>


                


            </main>
        </div>

        <script src="app.js"></script>

    </body>
</html>
